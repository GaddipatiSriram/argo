# Cluster registration Secret — mgmt-observability in argocd-sre.
# Mirror of argo/sre/mgmt-storage/cluster-secret.yaml pattern.
#
# Apply:
#   kubectl --context admin apply -f cluster-secret.yaml
#
# Labels drive ApplicationSet cluster selectors:
#   tier=mgmt  → matches "any mgmt-tier cluster" Pattern A selectors
#   role=observ → matches "central observability backends" Pattern C
#   env=nonprod → reserved for future prod-tier distinctions
#
# The .data.config blob contains: bearerToken + CA cert, base64'd.
# Regenerate by extracting from the argocd-manager-token Secret on
# mgmt-observability (see argo/sre/bootstrap-sa.yaml).

apiVersion: v1
kind: Secret
metadata:
  name: mgmt-observability
  namespace: argocd-sre
  labels:
    argocd.argoproj.io/secret-type: cluster
    tier: mgmt
    role: observ
    env: nonprod
    managed-by: manual-bootstrap
type: Opaque
stringData:
  name: mgmt-observability
  server: https://10.10.3.100:6443
data:
  config: 
