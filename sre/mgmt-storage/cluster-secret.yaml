# Cluster registration Secret — tells argocd-sre how to reach mgmt-storage.
#
# Apply WITH the OKD admin kubeconfig:
#   kubectl --context admin apply -f cluster-secret.yaml
#
# The .data.config field is a base64 blob containing:
#   { bearerToken: "<SA token>", tlsClientConfig: { insecure: false, caData: "<CA cert>" } }
#
# Bearer token + CA are taken from the argocd-manager-token Secret produced
# by bootstrap-sa.yaml on mgmt-storage. Regenerate via:
#   CA=$(kubectl --context mgmt-storage -n kube-system get secret argocd-manager-token -o=jsonpath='{.data.ca\.crt}')
#   TOKEN=$(kubectl --context mgmt-storage -n kube-system get secret argocd-manager-token -o=jsonpath='{.data.token}' | base64 -d)
#   echo -n "{\"bearerToken\":\"$TOKEN\",\"tlsClientConfig\":{\"insecure\":false,\"caData\":\"$CA\"}}" | base64 -w 0
#
# Labels drive ApplicationSet cluster selectors — tier=mgmt role=storage
# matches similar selectors on mgmt-forge (role=forge).

apiVersion: v1
kind: Secret
metadata:
  name: mgmt-storage
  namespace: argocd-sre
  labels:
    argocd.argoproj.io/secret-type: cluster
    tier: mgmt
    role: storage
    env: nonprod
    managed-by: argo-sre-bootstrap
type: Opaque
stringData:
  name: mgmt-storage
  server: https://10.10.4.100:6443
data:
  config: 
