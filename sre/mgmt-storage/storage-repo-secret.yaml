# Repository credentials for the storage repo, so argocd-sre can pull
# rook-ceph operator/cluster charts.
#
# Mirrors the forge repo pattern (argo/sre/forge/forge-secret-sre.yaml).
#
# Apply:
#   kubectl --context admin apply -f storage-repo-secret.yaml
#
# If the repo is public, this Secret is optional — delete it and Argo will
# fall back to anonymous HTTPS clone. If it's private, replace the password
# with a PAT that has repo:read scope. Homelab: cleartext PAT is acceptable;
# for real use, move to SOPS/sealed-secrets/ESO.

apiVersion: v1
kind: Secret
metadata:
  name: storage-repo
  namespace: argocd-sre
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: https://github.com/GaddipatiSriram/storage.git
  # username: GaddipatiSriram
  # password: <paste a GitHub PAT here if the repo is private>
